server:
  port: 8888
  servlet:
    session:
      timeout: 3600s
    tomcat:
      max-http-form-post-size: 500MB
  tomcat:
    max-http-form-post-size: 500MB
    connection-timeout: 300000
    max-keep-alive-requests: 500
    websocket:
      max-text-message-buffer-size: 524288
      max-binary-message-buffer-size: 524288
      connection-timeout-millis: 3600000
spring:
  profiles:
    active: dev
  jackson:
    property-naming-strategy: SNAKE_CASE
logging:
  file:
    path: "./.logs"
  level:
    root: error
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    auto-mapping-behavior: full
    map-underscore-to-camel-case: true
