<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>密码重置</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
<div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee;">
    <h2 style="color: #2c3e50;">密码重置请求</h2>
    <p>亲爱的${name}：</p>
    <p>您收到此邮件是因为您（或其他人）请求重置您账户的密码。</p>
    <p>请点击以下按钮重置您的密码：</p>
    <p style="text-align: center;">
        <a href="${url}" style="display: inline-block; padding: 10px 20px; background-color: #3498db; color: white; text-decoration: none; border-radius: 4px;">重置密码</a>
    </p>
    <p>或者，您可以复制以下链接到浏览器地址栏：</p>
    <p>${url}</p>
    <p>如果您没有请求重置密码，请忽略此邮件，您的密码将保持不变。</p>
    <p>此链接将在 24 小时后失效。</p>
    <p>谢谢！</p>
</div>
</body>
</html>
